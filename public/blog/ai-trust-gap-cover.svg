<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="adoptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="trustGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="0.5">The AI Coding Paradox</text>

  <!-- Left: Adoption -->
  <g transform="translate(250, 180)">
    <text x="100" y="0" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-transform="uppercase" letter-spacing="2">ADOPTION</text>
    <!-- Circular progress - 84% -->
    <circle cx="100" cy="130" r="95" fill="none" stroke="#1e3a5f" stroke-width="18"/>
    <circle cx="100" cy="130" r="95" fill="none" stroke="url(#adoptGrad)" stroke-width="18"
            stroke-dasharray="502" stroke-dashoffset="80" stroke-linecap="round"
            transform="rotate(-90, 100, 130)"/>
    <text x="100" y="120" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="64" font-weight="800">84</text>
    <text x="100" y="155" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="20" font-weight="500">percent</text>
    <text x="100" y="280" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15">of developers use AI</text>
    <text x="100" y="302" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15">coding tools daily</text>
  </g>

  <!-- Center: Gap indicator -->
  <g transform="translate(530, 260)">
    <line x1="0" y1="50" x2="140" y2="50" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="70" y="30" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="18" font-weight="700">55pt GAP</text>
  </g>

  <!-- Right: Trust -->
  <g transform="translate(750, 180)">
    <text x="100" y="0" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-transform="uppercase" letter-spacing="2">TRUST</text>
    <!-- Circular progress - 29% -->
    <circle cx="100" cy="130" r="95" fill="none" stroke="#3d2e0a" stroke-width="18"/>
    <circle cx="100" cy="130" r="95" fill="none" stroke="url(#trustGrad)" stroke-width="18"
            stroke-dasharray="597" stroke-dashoffset="424" stroke-linecap="round"
            transform="rotate(-90, 100, 130)"/>
    <text x="100" y="120" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="64" font-weight="800">29</text>
    <text x="100" y="155" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="20" font-weight="500">percent</text>
    <text x="100" y="280" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15">trust the AI-generated</text>
    <text x="100" y="302" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15">code they ship</text>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(0, 530)">
    <rect x="100" y="0" width="280" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="240" y="30" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Trust down <tspan fill="#ef4444" font-weight="700">11 points</tspan> from 2024</text>

    <rect x="460" y="0" width="280" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="600" y="30" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">AI PRs have <tspan fill="#ef4444" font-weight="700">1.7x</tspan> more issues</text>

    <rect x="820" y="0" width="280" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="960" y="30" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Devs are <tspan fill="#ef4444" font-weight="700">19% slower</tspan> with AI</text>
  </g>

  <!-- Source -->
  <text x="600" y="618" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Sources: Stack Overflow 2025 Survey, CodeRabbit 2026, METR 2025</text>
</svg>