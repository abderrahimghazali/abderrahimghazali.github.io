<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="8" fill="#fafafa" stroke="#e5e5e5"/>
  <text x="400" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#111">Project Glasswing — How It Works</text>

  <!-- Mythos box -->
  <rect x="310" y="60" width="180" height="50" rx="8" fill="#C15F3C" opacity="0.1" stroke="#C15F3C" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#C15F3C">Claude Mythos Preview</text>

  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#999" stroke-width="1.5"/>
  <polygon points="395,138 400,148 405,138" fill="#999"/>

  <!-- Finds vulns box -->
  <rect x="280" y="148" width="240" height="40" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="400" y="173" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#555">Discovers zero-day vulnerabilities</text>

  <!-- Arrow splits -->
  <line x1="400" y1="188" x2="400" y2="208" stroke="#999" stroke-width="1.5"/>
  <line x1="400" y1="208" x2="180" y2="208" stroke="#999" stroke-width="1.5"/>
  <line x1="400" y1="208" x2="620" y2="208" stroke="#999" stroke-width="1.5"/>
  <line x1="180" y1="208" x2="180" y2="228" stroke="#999" stroke-width="1.5"/>
  <line x1="400" y1="208" x2="400" y2="228" stroke="#999" stroke-width="1.5"/>
  <line x1="620" y1="208" x2="620" y2="228" stroke="#999" stroke-width="1.5"/>
  <polygon points="175,226 180,236 185,226" fill="#999"/>
  <polygon points="395,226 400,236 405,226" fill="#999"/>
  <polygon points="615,226 620,236 625,226" fill="#999"/>

  <!-- Three partner boxes -->
  <rect x="90" y="238" width="180" height="55" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="180" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#222">Tech Partners</text>
  <text x="180" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888">Apple, Google, Microsoft,</text>
  <text x="180" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888">NVIDIA, Cisco, AWS</text>

  <rect x="310" y="238" width="180" height="55" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="400" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#222">Finance</text>
  <text x="400" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888">JPMorgan Chase +</text>
  <text x="400" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888">major US banks</text>

  <rect x="530" y="238" width="180" height="55" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="620" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#222">Open Source</text>
  <text x="620" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888">Linux Foundation +</text>
  <text x="620" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888">$4M in donations</text>
</svg>
